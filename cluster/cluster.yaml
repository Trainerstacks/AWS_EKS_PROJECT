apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: spring-test-cluster
  region: ap-southeast-2
  version: "1.30"
vpc:
  id: "vpc-078b05e53f3cbf6e5"
  subnets:
    private:
      ap-southeast-2a:
        id: "subnet-0aefab085a9caeb31"
      ap-southeast-2b:
        id: "subnet-065810f858b83e9d0"
    public:
      ap-southeast-2a:
        id: "subnet-0984ce60e28a9ceca"
      ap-southeast-2b:
        id: "subnet-041a5fb23de041ab6"
managedNodeGroups:
  - name: ng-1
    labels: { role: worker }
    instanceType: t3.medium
    desiredCapacity: 3
    minSize: 3
    maxSize: 5
    privateNetworking: true
    ssh:
      allow: true
      publicKeyName: ec2-db-key-pair123
    iam:
      withAddonPolicies:
        imageBuilder: true
        awsLoadBalancerController: true
        autoScaler: true
iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      attachPolicyARNs:
        - "arn:aws:iam::078238935473:policy/AWSLoadBalancerControllerIAMPolicy"
