apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: spring-test-cluster
  region: ap-southeast-2
  version: "1.30"
vpc:
  id: "vpc-096e661efd34d9ac4"
  subnets:
    private:
      ap-southeast-2a:
        id: "subnet-0e056fe03f16993cb"
      ap-southeast-2b:
        id: "subnet-08cc80b07a00ffe9b"
    public:
      ap-southeast-2a:
        id: "subnet-071b0f7d4de2d685e"
      ap-southeast-2b:
        id: "subnet-02a50b4f61abb324c"
managedNodeGroups:
  - name: ng-1
    labels: { role: worker }
    instanceType: t3.medium
    desiredCapacity: 3
    minSize: 3
    maxSize: 5
    privateNetworking: true
    ssh:
      allow: true
      publicKeyName: ec2-db-key-pair
    iam:
      withAddonPolicies:
        imageBuilder: true
        awsLoadBalancerController: true
        autoScaler: true
iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      attachPolicyARNs:
        - "arn:aws:iam::258975980349:policy/AWSLoadBalancerControllerIAMPolicy"
